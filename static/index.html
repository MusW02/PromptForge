<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptForge - AI Prompt Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --border: #1e1e2e;
            --accent: #7fff6e;
            --accent2: #6ef0ff;
            --text: #e8e8f0;
            --muted: #6b6b7e;
            --success: #4ade80;
            --error: #ff6b6b;
            --warning: #fbbf24;
        }

        body {
            font-family: 'Space Mono', monospace;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* ─── LAYOUT ─────────────────────────────────────────────── */
        .container {
            display: flex;
            height: 100vh;
            gap: 0;
        }

        .sidebar {
            width: 300px;
            background-color: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 0;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header h1 .logo-icon {
            color: var(--accent);
            margin-right: 8px;
        }

        .content-area {
            flex: 1;
            display: flex;
            gap: 0;
            overflow: hidden;
        }

        .input-panel {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            overflow-y: auto;
        }

        .output-panel {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* ─── SIDEBAR SECTIONS ───────────────────────────────────── */
        .sidebar-section {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-section h3 {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 12px;
        }

        .control-group {
            margin-bottom: 12px;
        }

        .control-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-group select,
        .control-group input {
            width: 100%;
            padding: 8px 10px;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .control-group select:hover,
        .control-group input:hover {
            border-color: var(--accent);
        }

        .control-group select:focus,
        .control-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(127, 255, 110, 0.1);
        }

        /* ─── HISTORY SECTION ───────────────────────────────────── */
        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            padding: 10px;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 11px;
            line-height: 1.4;
        }

        .history-item:hover {
            background-color: rgba(127, 255, 110, 0.1);
            border-color: var(--accent);
        }

        .history-item-title {
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item-meta {
            color: var(--muted);
            font-size: 10px;
        }

        .history-item-time {
            color: var(--muted);
            font-size: 10px;
            margin-top: 4px;
        }

        .clear-history-btn {
            padding: 8px 12px;
            background-color: rgba(255, 107, 107, 0.15);
            border: 1px solid var(--error);
            color: var(--error);
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            width: 100%;
        }

        .clear-history-btn:hover {
            background-color: var(--error);
            color: var(--bg);
        }

        /* ─── BUTTONS ────────────────────────────────────────────── */
        button {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 10px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--accent);
            color: var(--bg);
            width: 100%;
            margin-top: 12px;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: #6ee550;
            box-shadow: 0 0 20px rgba(127, 255, 110, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 8px 12px;
        }

        .btn-secondary:hover {
            background-color: rgba(127, 255, 110, 0.1);
        }

        /* ─── OUTPUT SECTION ─────────────────────────────────────── */
        .output-header {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 12px;
        }

        .output-box {
            flex: 1;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 12px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            line-height: 1.6;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 200px;
            color: var(--text);
        }

        .output-meta {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            font-size: 11px;
            color: var(--muted);
        }

        .output-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .output-meta-value {
            color: var(--accent);
            font-weight: 600;
        }

        .btn-copy {
            padding: 8px 12px;
            font-size: 11px;
            margin-top: 12px;
        }

        /* ─── LOADING & ERROR STATES ─────────────────────────────── */
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(127, 255, 110, 0.3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-toast {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: var(--error);
            color: white;
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translate(400px, 0);
                opacity: 0;
            }
            to {
                transform: translate(0, 0);
                opacity: 1;
            }
        }

        .success-toast {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: var(--success);
            color: var(--bg);
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--muted);
            text-align: center;
            font-size: 13px;
        }

        /* ─── SCROLLBAR STYLING ──────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background-color: var(--surface);
        }

        ::-webkit-scrollbar-thumb {
            background-color: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: var(--accent);
        }

        /* ─── RESPONSIVE ─────────────────────────────────────────── */
        @media (max-width: 1200px) {
            .sidebar {
                width: 250px;
            }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                max-height: 200px;
            }

            .content-area {
                flex-direction: column;
            }

            .input-panel,
            .output-panel {
                border: none;
                border-top: 1px solid var(--border);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ─── SIDEBAR ─────────────────────────────────────────────── -->
        <div class="sidebar">
            <!-- Settings Section -->
            <div class="sidebar-section">
                <h3>⚙️ Settings</h3>

                <div class="control-group">
                    <label for="target">Target AI</label>
                    <select id="target">
                        <option value="Cursor">Cursor</option>
                        <option value="Claude">Claude</option>
                        <option value="Both (Cursor + Claude)" selected>Both (Cursor + Claude)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="taskType">Task Type</label>
                    <select id="taskType">
                        <option value="Auto-detect" selected>Auto-detect</option>
                        <option value="Code Generation">Code Generation</option>
                        <option value="Debugging">Debugging</option>
                        <option value="Refactoring">Refactoring</option>
                        <option value="Documentation">Documentation</option>
                        <option value="Architecture">Architecture</option>
                        <option value="Testing">Testing</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="style">Style</label>
                    <select id="style">
                        <option value="Minimal">Minimal (Concise)</option>
                        <option value="Balanced" selected>Balanced</option>
                        <option value="Detailed">Detailed (Rich)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="language">Language/Framework (Optional)</label>
                    <input type="text" id="language" placeholder="e.g., Python, React, Rust...">
                </div>
            </div>

            <!-- History Section -->
            <div class="sidebar-section" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                <h3>📋 History</h3>
                <div class="history-list" id="historyList">
                    <div class="empty-state">No history yet</div>
                </div>
                <button class="clear-history-btn" id="clearHistoryBtn">Clear History</button>
            </div>
        </div>

        <!-- ─── MAIN CONTENT ────────────────────────────────────────── -->
        <div class="main">
            <div class="header">
                <h1><span class="logo-icon">⚡</span>PromptForge</h1>
                <div id="loadingSpinner" class="loading-spinner"></div>
            </div>

            <div class="content-area">
                <!-- INPUT PANEL -->
                <div class="input-panel">
                    <div style="margin-bottom: 12px;">
                        <label style="display: block; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 8px;">
                            💭 Your Raw Thoughts
                        </label>
                        <textarea 
                            id="rawInput" 
                            placeholder="Paste your messy prompt ideas here. Describe what you want the AI to do, constraints, style preferences, anything goes..."
                            style="flex: 1; width: 100%; padding: 12px; background-color: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 12px; line-height: 1.6; resize: none; min-height: 250px;"
                        ></textarea>
                        <button class="btn-primary" id="generateBtn">Generate Prompt</button>
                    </div>
                </div>

                <!-- OUTPUT PANEL -->
                <div class="output-panel">
                    <div class="output-header">🎯 Optimized System Prompt</div>
                    <div class="output-box" id="outputBox">
                        <div class="empty-state">Your structured prompt will appear here...</div>
                    </div>
                    <div class="output-meta">
                        <div class="output-meta-item">
                            <span>Tokens Used:</span>
                            <span class="output-meta-value" id="tokensDisplay">0</span>
                        </div>
                        <div class="output-meta-item" id="copyFeedback" style="color: var(--success); display: none;">
                            ✓ Copied!
                        </div>
                    </div>
                    <button class="btn-secondary btn-copy" id="copyBtn" style="display: none;">📋 Copy Prompt</button>
                </div>
            </div>
        </div>
    </div>

    <!-- TOASTS -->
    <div class="error-toast" id="errorToast"></div>
    <div class="success-toast" id="successToast"></div>

    <!-- JAVASCRIPT -->
    <script>
        // DOM Elements
        const rawInputEl = document.getElementById('rawInput');
        const targetEl = document.getElementById('target');
        const taskTypeEl = document.getElementById('taskType');
        const styleEl = document.getElementById('style');
        const languageEl = document.getElementById('language');
        const generateBtn = document.getElementById('generateBtn');
        const outputBoxEl = document.getElementById('outputBox');
        const copyBtn = document.getElementById('copyBtn');
        const tokensDisplayEl = document.getElementById('tokensDisplay');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const errorToastEl = document.getElementById('errorToast');
        const successToastEl = document.getElementById('successToast');
        const historyListEl = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const copyFeedback = document.getElementById('copyFeedback');

        let currentPrompt = '';

        // Event Listeners
        generateBtn.addEventListener('click', handleGenerate);
        copyBtn.addEventListener('click', handleCopy);
        clearHistoryBtn.addEventListener('click', handleClearHistory);

        // Load history on page load
        window.addEventListener('load', loadHistory);

        // Handle Generate
        async function handleGenerate() {
            const rawInput = rawInputEl.value.trim();

            if (!rawInput) {
                showErrorToast('Please enter your thoughts before generating a prompt.');
                return;
            }

            // Disable button and show spinner
            generateBtn.disabled = true;
            loadingSpinner.style.display = 'inline-block';

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        raw_input: rawInput,
                        target: targetEl.value,
                        task_type: taskTypeEl.value,
                        style: styleEl.value,
                        language: languageEl.value,
                    }),
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();

                if (data.error) {
                    showErrorToast(data.error);
                } else {
                    currentPrompt = data.prompt;
                    outputBoxEl.textContent = currentPrompt;
                    tokensDisplayEl.textContent = data.tokens_used;
                    copyBtn.style.display = 'inline-block';
                    showSuccessToast('Prompt generated successfully! ✨');
                    
                    // Reload history to show new entry
                    loadHistory();
                }
            } catch (error) {
                showErrorToast(`Generation failed: ${error.message}`);
            } finally {
                generateBtn.disabled = false;
                loadingSpinner.style.display = 'none';
            }
        }

        // Handle Copy
        function handleCopy() {
            if (currentPrompt) {
                navigator.clipboard.writeText(currentPrompt).then(() => {
                    copyFeedback.style.display = 'inline-flex';
                    setTimeout(() => {
                        copyFeedback.style.display = 'none';
                    }, 2000);
                }).catch(() => {
                    showErrorToast('Failed to copy to clipboard');
                });
            }
        }

        // Load History
        async function loadHistory() {
            try {
                const response = await fetch('/api/history');
                if (!response.ok) throw new Error('Failed to load history');
                
                const data = await response.json();
                const items = data.items;

                if (items.length === 0) {
                    historyListEl.innerHTML = '<div class="empty-state">No history yet</div>';
                    return;
                }

                historyListEl.innerHTML = items.reverse().map((item, index) => `
                    <div class="history-item" onclick="restoreFromHistory(${items.length - index - 1})">
                        <div class="history-item-title">${item.task_type || 'Untitled'}</div>
                        <div class="history-item-meta">
                            Target: ${item.target}<br>
                            Style: ${item.style}
                        </div>
                        <div class="history-item-time">
                            ${new Date(item.timestamp).toLocaleDateString()} ${new Date(item.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }

        // Restore from History
        async function restoreFromHistory(index) {
            try {
                const response = await fetch('/api/history');
                const data = await response.json();
                const item = data.items[index];

                if (item) {
                    targetEl.value = item.target;
                    taskTypeEl.value = item.task_type;
                    styleEl.value = item.style;
                    languageEl.value = item.language || '';
                    rawInputEl.value = item.raw_input;
                    currentPrompt = item.prompt;
                    outputBoxEl.textContent = currentPrompt;
                    tokensDisplayEl.textContent = item.tokens_used;
                    copyBtn.style.display = 'inline-block';
                    showSuccessToast('Restored from history ✨');
                }
            } catch (error) {
                showErrorToast('Failed to restore from history');
            }
        }

        // Handle Clear History
        async function handleClearHistory() {
            if (!confirm('Are you sure you want to clear all history? This cannot be undone.')) {
                return;
            }

            try {
                const response = await fetch('/api/history/clear', {
                    method: 'POST',
                });

                if (response.ok) {
                    loadHistory();
                    showSuccessToast('History cleared');
                } else {
                    showErrorToast('Failed to clear history');
                }
            } catch (error) {
                showErrorToast('Error clearing history');
            }
        }

        // Toast Functions
        function showErrorToast(message) {
            errorToastEl.textContent = message;
            errorToastEl.style.display = 'block';
            setTimeout(() => {
                errorToastEl.style.display = 'none';
            }, 5000);
        }

        function showSuccessToast(message) {
            successToastEl.textContent = message;
            successToastEl.style.display = 'block';
            setTimeout(() => {
                successToastEl.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
